---
# Register Nimbus ETH1 Benchmark metrics exporter with Consul

- name: Create Consul service definition for metrics exporter
  include_role: name=infra-role-consul-service
  vars:
    consul_config_name: 'nimbus-eth1-benchmark-metrics'
    consul_services:
      - name: 'nimbus-eth1-benchmark-metrics'
        tags:
          - 'nimbus-eth1'
          - 'benchmarks'
          - 'metrics'
          - 'prometheus'
        port: '{{ metrics_listen_port }}'
        address: '{{ ansible_local.wireguard.address }}'
        meta:
          component: 'nimbus-eth1-benchmarks'
        checks:
          - id: 'nimbus-eth1-benchmark-metrics-http'
            name: 'Metrics Exporter HTTP'
            type: http
            http: 'http://localhost:{{ metrics_listen_port }}/metrics'
            interval: '60s'
            timeout: '5s'
          - id: 'nimbus-eth1-benchmark-health'
            name: 'Benchmark Health Check'
            type: script
            script: '/opt/nimbus-benchmark/health-check.sh {{ nimbus_eth1_benchmark_type }}'
            interval: '5m'
            timeout: '10s'
  when: consul_config_name is defined or env is defined